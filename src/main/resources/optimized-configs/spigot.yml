messages:
  whitelist: You are not whitelisted on this server!
  server-full: The server is full!
  outdated-client: Outdated client! Please use {0}
  outdated-server: Outdated server! I'm still on {0}
  restart: Server is restarting

settings:
  bungeecord: false
  save-user-cache-on-stop-only: false
  sample-count: 12
  player-shuffle: 0
  user-cache-size: 1000
  moved-wrongly-threshold: 0.0625
  moved-too-quickly-multiplier: 10.0
  timeout-time: 60
  restart-on-crash: true
  restart-script: ./start.sh
  netty-threads: 4
  attribute:
    maxAbsorption:
      max: 2048.0
    maxHealth:
      max: 1024.0
    movementSpeed:
      max: 1024.0
    attackDamage:
      max: 2048.0
  log-villager-deaths: true
  log-named-deaths: true
  debug: false

advancements:
  disable-saving: false
  disabled:
  - minecraft:story/disabled

world-settings:
  default:
    below-zero-generation-in-existing-chunks: true
    view-distance: default
    simulation-distance: default
    thunder-chance: 100000

    # OPTIMIZED: aggressive item merging
    merge-radius:
      item: 6.0     # up from 0.5, merge items aggressively
      exp: 8.0      # up from -1, merge xp aggressively

    # OPTIMIZED: reduced mob spawn range
    mob-spawn-range: 4  # down from 8, mobs spawn closer to players

    # OPTIMIZED: faster item/projectile despawn
    item-despawn-rate: 3000    # down from 6000, items despawn in 2.5 min
    arrow-despawn-rate: 200    # down from 1200, arrows gone fast
    trident-despawn-rate: 400  # down from 1200

    zombie-aggressive-towards-villager: true
    nerf-spawner-mobs: false
    enable-zombie-pigmen-portal-spawns: true
    wither-spawn-sound-radius: 0
    end-portal-sound-radius: 0
    hanging-tick-frequency: 200  # up from 100, item frames tick less
    unload-frozen-chunks: true   # changed from false, unload frozen chunks

    growth:
      cactus-modifier: 100
      cane-modifier: 100
      melon-modifier: 100
      mushroom-modifier: 100
      pumpkin-modifier: 100
      sapling-modifier: 100
      beetroot-modifier: 100
      carrot-modifier: 100
      potato-modifier: 100
      torchflower-modifier: 100
      wheat-modifier: 100
      netherwart-modifier: 100
      vine-modifier: 100
      cocoa-modifier: 100
      bamboo-modifier: 100
      sweetberry-modifier: 100
      kelp-modifier: 100
      twistingvines-modifier: 100
      weepingvines-modifier: 100
      cavevines-modifier: 100
      glowberry-modifier: 100
      pitcherplant-modifier: 100

    # OPTIMIZED: heavily reduced activation ranges
    entity-activation-range:
      animals: 8          # down from 32
      monsters: 16        # down from 32, our decided detection range
      raiders: 24         # down from 64
      misc: 6             # down from 16
      water: 8            # down from 16
      villagers: 8        # down from 32
      flying-monsters: 16 # down from 32
      wake-up-inactive:
        animals-max-per-tick: 2      # down from 4
        animals-every: 2400          # up from 1200
        animals-for: 60              # down from 100
        monsters-max-per-tick: 4     # down from 8
        monsters-every: 800          # up from 400
        monsters-for: 60             # down from 100
        villagers-max-per-tick: 1    # down from 4
        villagers-every: 1200        # up from 600
        villagers-for: 60            # down from 100
        flying-monsters-max-per-tick: 4  # down from 8
        flying-monsters-every: 400       # up from 200
        flying-monsters-for: 60          # down from 100
      villagers-work-immunity-after: 100
      villagers-work-immunity-for: 20
      villagers-active-for-panic: false  # changed from true, villagers dont panic
      tick-inactive-villagers: false     # changed from true, HUGE saving
      ignore-spectators: true            # changed from false

    # OPTIMIZED: heavily reduced tracking ranges
    entity-tracking-range:
      players: 64    # down from 128
      animals: 32    # down from 96
      monsters: 48   # down from 96
      misc: 24       # down from 96
      display: 64    # down from 128
      other: 24      # down from 64

    # OPTIMIZED: hopper check every 30 seconds but transfer everything
    ticks-per:
      hopper-transfer: 1      # transfer instantly when it does run
      hopper-check: 600       # check every 30 seconds down from 1
    hopper-amount: 64         # transfer up to 64 items when it runs, up from 1
    hopper-can-load-chunks: false

    dragon-death-sound-radius: 0
    seed-village: 10387312
    seed-desert: 14357617
    seed-igloo: 14357618
    seed-jungle: 14357619
    seed-swamp: 14357620
    seed-monument: 10387313
    seed-shipwreck: 165745295
    seed-ocean: 14357621
    seed-outpost: 165745296
    seed-endcity: 10387313
    seed-slime: 987234911
    seed-nether: 30084232
    seed-mansion: 10387319
    seed-fossil: 14357921
    seed-portal: 34222645
    seed-ancientcity: 20083232
    seed-trailruins: 83469867
    seed-trialchambers: 94251327
    seed-buriedtreasure: 10387320
    seed-mineshaft: default
    seed-stronghold: default

    hunger:
      jump-walk-exhaustion: 0.05
      jump-sprint-exhaustion: 0.2
      combat-exhaustion: 0.1
      regen-exhaustion: 6.0
      swim-multiplier: 0.01
      sprint-multiplier: 0.1
      other-multiplier: 0.0

    max-tnt-per-tick: 20  # down from 100
    max-tick-time:
      tile: 20   # down from 50
      entity: 20 # down from 50
    verbose: false

players:
  disable-saving: false

config-version: 12

stats:
  disable-saving: false
  forced-stats: {}

commands:
  log: true
  tab-complete: 0
  send-namespaced: true
  spam-exclusions:
  - /skill
  silent-commandblock-console: false
  replace-commands:
  - setblock
  - summon
  - testforblock
  - tellraw
  enable-spam-exclusions: false
