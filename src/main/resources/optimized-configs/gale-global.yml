_version: 1

gameplay-mechanics:
  enable-book-writing: true

log-to-console:
  chat:
    empty-message-warning: false
    expired-message-warning: false
    not-secure-marker: false    # changed from true, reduce log spam
  ignored-advancements: false   # changed from true, reduce log spam
  invalid-legacy-text-component: false  # reduce log spam
  invalid-statistics: false     # reduce log spam
  legacy-material-initialization: false
  null-id-disconnections: true
  player-login-locations: true
  plugin-library-loader:
    downloads: false            # reduce log spam
    library-loaded: false       # reduce log spam
    start-load-libraries-for-plugin: false
  set-block-in-far-chunk: false # reduce log spam
  unrecognized-recipes: false

misc:
  ignore-null-legacy-structure-data: false
  keepalive:
    send-multiple: false
  last-tick-time-in-tps-command:
    add-oversleep: false
    enabled: true               # changed from false, useful for monitoring
  premium-account-slow-login-timeout: -1
  verify-chat-order: true

# OPTIMIZED: heavily increased intervals
small-optimizations:
  reduced-intervals:
    increase-time-statistics: 40   # up from 1, update time stats rarely
    update-entity-line-of-sight: 16  # up from 4, check LOS less often
