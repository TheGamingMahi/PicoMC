_version: 31

anticheat:
  obfuscation:
    items:
      all-models:
        also-obfuscate: []
        dont-obfuscate:
        - minecraft:lodestone_tracker
        sanitize-count: true
      enable-item-obfuscation: false
      model-overrides:
        minecraft:elytra:
          also-obfuscate: []
          dont-obfuscate:
          - minecraft:damage
          sanitize-count: true

block-updates:
  disable-chorus-plant-updates: false
  disable-mushroom-block-updates: false
  disable-noteblock-updates: false
  disable-tripwire-updates: false

# OPTIMIZED: aggressive chunk loading limits
chunk-loading-advanced:
  auto-config-send-distance: true
  player-max-concurrent-chunk-generates: 2  # balanced for low resource
  player-max-concurrent-chunk-loads: 4      # enough for smooth exploration

chunk-loading-basic:
  player-max-chunk-generate-rate: 8.0    # balanced — smooth exploration without CPU spikes
  player-max-chunk-load-rate: 30.0       # up from 15, less noticeable loading
  player-max-chunk-send-rate: 20.0       # up from 8, chunks appear faster on client

# OPTIMIZED: tune chunk IO threads
chunk-system:
  io-threads: 2       # 2 threads for chunk IO, better than 1
  worker-threads: 2   # 2 workers for chunk generation

collisions:
  enable-player-collisions: true
  send-full-pos-for-hard-colliding-entities: true

commands:
  ride-command-allow-player-as-vehicle: false
  suggest-player-names-when-null-tab-completions: true
  time-command-affects-all-worlds: false

console:
  enable-brigadier-completions: true
  enable-brigadier-highlighting: true
  has-all-permissions: false

item-validation:
  book:
    author: 8192
    page: 16384
    title: 8192
  book-size:
    page-max: 2560
    total-multiplier: 0.98
  display-name: 8192
  lore-line: 8192
  resolve-selectors-in-books: false

logging:
  deobfuscate-stacktraces: true

messages:
  kick:
    authentication-servers-down: <lang:multiplayer.disconnect.authservers_down>
    connection-throttle: Connection throttled! Please wait before reconnecting.
    flying-player: <lang:multiplayer.disconnect.flying>
    flying-vehicle: <lang:multiplayer.disconnect.flying>
  no-permission: <red>I'm sorry, but you do not have permission to perform this command.
    Please contact the server administrators if you believe that this is in error.
  use-display-name-in-quit-message: false

misc:
  chat-threads:
    chat-executor-core-size: -1
    chat-executor-max-size: -1
  client-interaction-leniency-distance: default
  compression-level: default
  enable-nether: true
  fix-far-end-terrain-generation: true
  load-permissions-yml-before-plugins: true
  max-joins-per-tick: 3             # down from 5, less burst load on joins
  prevent-negative-villager-demand: false
  region-file-cache-size: 64        # down from 256, less memory for region cache
  send-full-pos-for-item-entities: false
  strict-advancement-dimension-check: false
  use-alternative-luck-formula: false
  use-dimension-type-for-custom-spawners: false
  xp-orb-groups-per-area: default

packet-limiter:
  all-packets:
    action: KICK
    interval: 7.0
    max-packet-rate: 500.0
  kick-message: <red><lang:disconnect.exceeded_packet_rate>
  overrides:
    minecraft:place_recipe:
      action: DROP
      interval: 4.0
      max-packet-rate: 5.0

player-auto-save:
  max-per-tick: 2     # limit from -1, dont save too many players per tick
  rate: 400           # save players every 20 seconds, from -1

proxies:
  bungee-cord:
    online-mode: true
  proxy-protocol: false
  velocity:
    enabled: false
    online-mode: true
    secret: ''

scoreboards:
  save-empty-scoreboard-teams: false  # changed from true
  track-plugin-scoreboards: false

spam-limiter:
  incoming-packet-threshold: 300
  recipe-spam-increment: 1
  recipe-spam-limit: 20
  tab-spam-increment: 1
  tab-spam-limit: 500

spark:
  enable-immediately: false
  enabled: true

unsupported-settings:
  allow-headless-pistons: false
  allow-permanent-block-break-exploits: false
  allow-piston-duplication: false
  allow-unsafe-end-portal-teleportation: false
  compression-format: ZLIB
  oversized-item-component-sanitizer:
    dont-sanitize: []
  perform-username-validation: true
  skip-tripwire-hook-placement-validation: false
  skip-vanilla-damage-tick-when-shield-blocked: false
  update-equipment-on-player-actions: true

update-checker:
  enabled: false  # changed from true, dont waste resources checking updates

watchdog:
  early-warning-delay: 10000
  early-warning-every: 5000
