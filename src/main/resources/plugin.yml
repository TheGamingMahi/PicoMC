name: PicoMC
version: '1.0.0-beta'
main: io.thegamingmahi.picomc.PicoMC
api-version: '1.21'
author: TheGamingMahi
description: Low footprint Minecraft server optimization suite for Leaf 1.21.11
website: https://github.com/TheGamingMahi/PicoMC

load: STARTUP

commands:
  pico:
    description: PicoMC management commands
    usage: /pico <status|pregenerate|reload|help>
    permission: picomc.admin

permissions:
  picomc.admin:
    description: Access to all PicoMC commands
    default: op
